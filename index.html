<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Умный Планировщик</title>
    
    <!-- === МАГИЯ ПРИЛОЖЕНИЯ === -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <!-- ======================== -->

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="app-header">
        <button class="icon-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></button>
        <h1>Планировщик</h1>
        <div style="display: flex; gap: 5px;">
            <button class="icon-btn" id="add-btn"><i class="fa-solid fa-plus"></i></button>
            <button class="icon-btn" id="theme-btn"><i class="fa-solid fa-moon"></i></button>
            <button class="icon-btn" id="settings-btn"><i class="fa-solid fa-gear"></i></button>
        </div>
    </header>

    <main class="app-main">
        
        <div id="view-controls" class="view-switchers">
            <button id="view-day">День</button>
            <button id="view-week" class="active">Неделя</button>
            <button id="view-month">Месяц</button>
        </div>

        <!-- === НОВЫЙ БЛОК: НАВИГАЦИЯ ПО ДАТАМ === -->
        <div class="date-navigator">
            <button class="icon-btn" id="prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="current-date-label">Сегодня</h2>
            <button class="icon-btn" id="next-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="calendar-grid">
            <div class="days-header">
                <div class="time-spacer"></div>
                <div class="day-col">Пн</div>
                <div class="day-col">Вт</div>
                <div class="day-col current-day">Ср</div>
                <div class="day-col">Чт</div>
                <div class="day-col">Пт</div>
                <div class="day-col">Сб</div>
                <div class="day-col">Вс</div>
            </div>

            <div class="time-grid-container" id="time-grid-container">
                <div class="time-grid" id="time-grid">
                </div>
            </div>

            <!-- === ПОЛОЧКА ДЛЯ ЗАДАЧ БЕЗ ВРЕМЕНИ (ТЕПЕРЬ ВНИЗУ) === -->
            <div id="anytime-container" class="anytime-container">
                <div class="time-spacer anytime-label">Без<br>времени</div>
                <div class="anytime-grid" id="anytime-grid"></div>
            </div>
            <!-- ========================================= -->

            <div id="month-grid" class="month-grid" style="display: none;"></div>
        </div>

    </main> <footer class="app-footer">
        <div class="input-container">
            <input type="text" id="task-input" placeholder="Напиши: Завтра в 14:00 учеба..." autocomplete="off">
            <button class="icon-btn mic-btn" id="mic-btn"><i class="fa-solid fa-microphone"></i></button>
            <button class="icon-btn send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </footer>
<!-- Модальное окно Создания / Редактирования задачи -->
    <div id="edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-title">Задача</h3>
            
            <label>Название</label>
            <input type="text" id="edit-title" placeholder="Что нужно сделать?">

            <label style="margin-top: 10px;">Категория</label>
            <select id="edit-category">
                <option value="personal">Личное (Фиолет)</option>
                <option value="work">Работа (Зеленый)</option>
                <option value="study">Учеба (Оранж)</option>
                <option value="sport">Спорт (Красный)</option>
                <option value="selfdev">Саморазвитие (Голубой)</option>
                <option value="health">Здоровье (Розовый)</option>
            </select>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <div style="flex: 1;">
                    <label>Дата</label>
                    <input type="date" id="edit-date">
                </div>
                <div style="flex: 1;">
                    <label>Время (чч:мм)</label>
                    <input type="time" id="edit-time">
                </div>
            </div>

            <label style="margin-top: 10px;">Длительность (в минутах)</label>
            <input type="number" id="edit-duration" min="5" step="5" placeholder="Оставьте пустым, если весь день">

            <label style="margin-top: 10px;">Приоритет</label>
            <select id="edit-priority">
                <option value="low">Обычный</option>
                <option value="medium">Важный (!)</option>
                <option value="high">Очень важный (!!!)</option>
            </select>

            <div class="modal-actions">
                <button id="btn-delete-task" class="btn-danger"><i class="fa-solid fa-trash"></i></button>
                <div>
                    <button id="btn-cancel-edit" class="btn-secondary">Отмена</button>
                    <button id="btn-save-edit" class="btn-primary">Сохранить</button>
                </div>
            </div>
        </div>
    </div>
<!-- === БОКОВОЕ МЕНЮ (СЛЕВА) === -->
    <div id="side-menu" class="side-menu">
        <div class="side-menu-header">
            <h2>Меню</h2>
            <button id="close-menu-btn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="side-menu-content">
            <!-- Переносим сюда фильтр -->
            <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: block;">Фильтр категорий</label>
            <select id="category-filter" class="filter-select" style="width: 100%; margin-bottom: 20px;">
                <option value="all">Показывать всё</option>
            </select>

            <button id="clear-done-btn" class="menu-action-btn btn-danger">
                <i class="fa-solid fa-broom"></i> Очистить выполненные
            </button>
        </div>
        
        <div class="side-menu-footer">
            Умный Планировщик v1.0
        </div>
    </div>

    <!-- Затемнение фона при открытом меню -->
    <div id="menu-overlay" class="modal-overlay" style="display: none; z-index: 1001;"></div>

    <script src="app.js"></script>
</body>
</html>
